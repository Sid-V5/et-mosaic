version: '3.8'

services:
  pgvector:
    image: pgvector/pgvector:pg16
    container_name: et-mosaic-db
    environment:
      POSTGRES_USER: etmosaic
      POSTGRES_PASSWORD: etpassword
      POSTGRES_DB: etmosaic
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pgdata:
